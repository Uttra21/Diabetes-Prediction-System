<!DOCTYPE html>
<html>
<head>
    <title>Prediction History</title>

    <style>

        body{
            font-family:Arial;
            padding:40px;
            background:#f4f4f4;
        }

        h1{
            text-align:center;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            border:1px solid #ddd;
            padding:12px;
            text-align:center;
        }

        th{
            background:#007bff;
            color:white;
        }

    </style>

</head>
<body>

<h1>Prediction History</h1>

<table border="1" cellpadding="10">
<tr>
    <th>ID</th>
    <th>Age</th>
    <th>Glucose</th>
    <th>Risk %</th>
    <th>Prediction</th>
    <th>Date</th>
</tr>

{% for row in records %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}%</td>
    <td>{{ row[4] }}</td>
    <td>{{ row[5] }}</td>
</tr>
{% endfor %}
</table>
</body>
</html>
