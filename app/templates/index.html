<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Prediction System</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            text-align:center;
            margin:0;
            padding:20px;
        }

        .container{
            width:600px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        h1{
            color:#007bff;
        }

        input{
            width:90%;
            padding:10px;
            margin:8px;
        }

        button{
            background:#007bff;
            color:white;
            border:none;
            padding:12px 25px;
            cursor:pointer;
            font-size:16px;
            border-radius:5px;
        }

        button:hover{
            background:#0056b3;
        }

        .result{
            margin-top:20px;
            font-size:22px;
            font-weight:bold;
        }

    </style>
</head>

<body>

<div class="container">

<h1>Diabetes Prediction System</h1>

<form action="/predict" method="POST">

<input type="number" step="any" name="Pregnancies" placeholder="Pregnancies" required>

<input type="number" step="any" name="Glucose" placeholder="Glucose" required>

<input type="number" step="any" name="BloodPressure" placeholder="Blood Pressure" required>

<input type="number" step="any" name="SkinThickness" placeholder="Skin Thickness" required>

<input type="number" step="any" name="Insulin" placeholder="Insulin" required>

<input type="number" step="any" name="BMI" placeholder="BMI" required>

<input type="number" step="any" name="DiabetesPedigreeFunction" placeholder="Diabetes Pedigree Function" required>

<input type="number" step="any" name="Age" placeholder="Age" required>

<br><br>

<button type="submit">
Predict
</button>

</form>

{% if prediction %}

<div class="result">

Prediction: {{ prediction }}

<br><br>

Risk Probability: {{ probability }}%

</div>

{% endif %}

</body>
</html>
